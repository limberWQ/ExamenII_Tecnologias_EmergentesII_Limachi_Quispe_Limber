{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-header bg-warning">
                    <h5 class="mb-0">Editar Pedido</h5>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Fecha</label>

                            <input type="date" name="fecha" class="form-control"
                                value="{{ pedido.fecha.strftime('%Y-%m-%d') }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Cliente</label>

                            <select name="cliente_id" class="form-select" required>

                                <option value="">Seleccionar cliente...</option>

                                {% for c in clientes %}
                                <option value="{{ c.id }}" {% if pedido.cliente_id==c.id %} selected {% endif %}>
                                    {{ c.nombre }}
                                </option>
                                {% endfor %}

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Producto</label>

                            <select name="producto_id" class="form-select" required>

                                <option value="">Seleccionar producto...</option>

                                {% for p in productos %}
                                {% if p.stock > 0 or pedido.producto_id == p.id %}

                                <option value="{{ p.id }}" {% if pedido.producto_id==p.id %} selected {% endif %}>

                                    {{ p.nombre }}

                                </option>

                                {% endif %}
                                {% endfor %}

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Monto</label>

                            <input type="number" step="0.01" name="monto" class="form-control"
                                value="{{ pedido.producto.precio }}" readonly required>
                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit" class="btn btn-warning">
                                Actualizar
                            </button>

                            <a href="{{ url_for('bp_pedidos.index') }}" class="btn btn-secondary">
                                Cancelar
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>
</div>
{% endblock %}
